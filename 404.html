<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="refresh" content="0; url=./" />
    <script>
      // GitHub Pages SPA redirect
      var l = window.location;
      var repo = '/KDashX3';
      if (l.pathname.startsWith(repo)) {
        l.replace(repo + '/#' + l.pathname.slice(repo.length) + l.search + l.hash);
      } else {
        l.replace('/#' + l.pathname + l.search + l.hash);
      }
    </script>
  </head>
  <body></body>
</html>
